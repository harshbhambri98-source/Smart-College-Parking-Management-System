
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart College Parking Management System</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
  <h1>Smart College Parking Management System</h1>
  <p>AI Powered Vehicle Tracking & Entry Management</p>
</header>

<main class="container">

  <div class="card">
    <h2>Vehicle Entry</h2>
    <input id="vehicle" placeholder="Vehicle Number">
    <select id="type">
      <option>Bike</option>
      <option>Car</option>
      <option>Truck</option>
    </select>
    <button onclick="addVehicle()">Park Vehicle</button>
  </div>

  <div class="card">
    <h2>Parking Analytics</h2>
    <canvas id="parkingChart"></canvas>
  </div>

  <div class="card">
    <h2>Vehicle Records</h2>
    <div id="records"></div>
  </div>

</main>

<script src="js/script.js"></script>

</body>
</html>
